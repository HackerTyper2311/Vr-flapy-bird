<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebXR Room-Scale VR Template</title>

  <!-- A-Frame latest stable -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <style>
    /* Minimal 2D overlay for non-VR debug/config panel */
    #debug-panel {
      position: fixed;
      top: 12px; left: 12px;
      background: rgba(10,10,20,0.88);
      color: #7efff5;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 14px 18px;
      border-radius: 8px;
      border: 1px solid rgba(126,255,245,0.25);
      z-index: 9999;
      max-width: 320px;
      pointer-events: none;
      line-height: 1.7;
    }
    #debug-panel h2 {
      margin: 0 0 8px;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dim { color: rgba(126,255,245,0.5); }
    #enter-vr-btn {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #7efff5;
      color: #050510;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 32px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 0 24px rgba(126,255,245,0.4);
      z-index: 9999;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #enter-vr-btn:hover {
      background: #fff;
      box-shadow: 0 0 40px rgba(126,255,245,0.8);
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     DEBUG PANEL  (visible in browser, hidden in VR)
═══════════════════════════════════════════════════ -->
<div id="debug-panel">
  <h2>⬡ Room-Scale VR Template</h2>
  <span class="dim">Headset position:</span> <span id="dbg-pos">–</span><br/>
  <span class="dim">Boundary walls:</span>   <span id="dbg-walls">0</span><br/>
  <span class="dim">Obstacles:</span>        <span id="dbg-obs">0</span><br/>
  <span class="dim">Collision:</span>        <span id="dbg-col">none</span><br/>
  <br/>
  <span class="dim">Edit ROOM_CONFIG + OBSTACLES</span><br/>
  <span class="dim">in the &lt;script&gt; block below.</span>
</div>

<button id="enter-vr-btn" onclick="document.querySelector('a-scene').enterVR()">
  ▶ ENTER VR
</button>


<!-- ═══════════════════════════════════════════════════
     A-FRAME SCENE
═══════════════════════════════════════════════════ -->
<a-scene
  id="main-scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  background="color: #050510"
  stats="false"
>

  <!-- ─── ASSETS ─────────────────────────────────── -->
  <a-assets>
    <!-- Grid texture for the floor (generated via canvas) -->
    <canvas id="grid-canvas" width="512" height="512"></canvas>
    <img id="grid-tex" src="">

    <!-- Boundary wall texture (generated via canvas) -->
    <canvas id="wall-canvas" width="256" height="256"></canvas>
    <img id="wall-tex" src="">
  </a-assets>


  <!-- ─── CAMERA RIG ──────────────────────────────
       The rig entity is the root that sits at floor level.
       WebXR automatically positions the <a-camera> inside it
       to match the headset's 6DoF pose — giving 1:1 room-scale
       movement with NO locomotion component needed.
  ──────────────────────────────────────────────── -->
  <a-entity
    id="camera-rig"
    position="0 0 0"
  >
    <!--
      wasd-controls and look-controls are DISABLED so that
      only physical headset movement drives the camera.
      The 'camera' component with userHeight=0 means the
      real-world floor == y=0 in VR space.
    -->
    <a-camera
      id="player-camera"
      look-controls="enabled: false"
      wasd-controls="enabled: false"
      user-height="0"
      near="0.05"
      far="100"
    >
      <!-- Tiny crosshair reticle (optional, hidden by default) -->
      <a-cursor
        color="#7efff5"
        opacity="0.5"
        raycaster="objects: .interactive"
        fuse="false"
      ></a-cursor>
    </a-camera>
  </a-entity>


  <!-- ─── ENVIRONMENT ────────────────────────────── -->

  <!-- Sky gradient sphere -->
  <a-sky color="#050510"></a-sky>

  <!-- Stars particle field -->
  <a-entity id="stars" position="0 0 0"></a-entity>

  <!-- Ground platform — grid texture applied by JS -->
  <a-plane
    id="floor"
    rotation="-90 0 0"
    width="20" height="20"
    material="src: #grid-tex; repeat: 10 10; transparent: true; opacity: 0.85"
    shadow="receive: true"
  ></a-plane>

  <!-- Ambient + directional lighting -->
  <a-light type="ambient"     color="#1a1a3e" intensity="1.2"></a-light>
  <a-light type="directional" color="#7efff5" intensity="0.6"
           position="3 8 -3" castShadow="true"></a-light>
  <a-light type="point"       color="#4488ff" intensity="0.4"
           position="0 2.5 0"></a-light>


  <!-- ─── BOUNDARY WALLS CONTAINER ───────────────
       JS will dynamically populate this with flat planes
       that represent the Guardian/Chaperone boundary.
  ──────────────────────────────────────────────── -->
  <a-entity id="boundary-container"></a-entity>


  <!-- ─── OBSTACLE CONTAINER ─────────────────────
       JS will dynamically populate this with box colliders
       that mirror real-world furniture / objects.
  ──────────────────────────────────────────────── -->
  <a-entity id="obstacle-container"></a-entity>


  <!-- ─── DECORATIVE REFERENCE OBJECTS ───────────
       Help the player orient themselves in the space.
  ──────────────────────────────────────────────── -->

  <!-- Cardinal direction markers -->
  <a-entity id="cardinal-markers"></a-entity>

  <!-- Center origin pillar -->
  <a-cylinder
    position="0 0.5 0"
    radius="0.02" height="1"
    color="#7efff5"
    material="emissive: #7efff5; emissiveIntensity: 0.6; transparent: true; opacity: 0.7"
  ></a-cylinder>
  <a-sphere
    position="0 1.05 0"
    radius="0.04"
    color="#7efff5"
    material="emissive: #7efff5; emissiveIntensity: 1"
  ></a-sphere>

</a-scene>


<!-- ═══════════════════════════════════════════════════
     MAIN CONFIGURATION + LOGIC
═══════════════════════════════════════════════════ -->
<script>
/* ───────────────────────────────────────────────────────
   STEP 1 — ROOM CONFIGURATION
   Edit these values to match your physical space.

   ROOM_CONFIG.width / depth : size of your play area in metres
   ROOM_CONFIG.origin        : where VR (0,0,0) sits relative
                               to the room's back-left corner
   OBSTACLES                 : real-world objects mapped to
                               axis-aligned bounding boxes.
                               Position = centre of object,
                               size = full extents.
─────────────────────────────────────────────────────── */
const ROOM_CONFIG = {
  width:  3.0,   // metres — X axis
  depth:  3.0,   // metres — Z axis
  height: 2.5,   // metres — ceiling reference (not enforced)
  wallThickness: 0.08,   // visual thickness of boundary planes
  boundaryColor:   '#00e5ff',
  boundaryOpacity: 0.18,   // 0 = invisible, 1 = fully solid
  boundaryVisible: true,   // toggle boundary planes on/off
};

/*
  Each obstacle entry:
  {
    id:       unique string id
    label:    human-readable name
    position: { x, y, z }   — centre of object, y=0 is floor
    size:     { w, h, d }   — full width / height / depth
    color:    CSS colour for the visual representation
    visible:  show a semi-transparent box (true) or invisible collider (false)
  }
*/
const OBSTACLES = [
  {
    id: 'table-1',
    label: 'Desk',
    position: { x:  1.0, y: 0.375, z:  0.5 },
    size:     { w:  1.2,  h: 0.75,  d: 0.6  },
    color:    '#ff6b35',
    visible:  true,
  },
  {
    id: 'chair-1',
    label: 'Chair',
    position: { x: -0.8, y: 0.45,  z: -0.5 },
    size:     { w:  0.5,  h: 0.9,   d: 0.5  },
    color:    '#a855f7',
    visible:  true,
  },
  {
    id: 'shelf-1',
    label: 'Bookshelf',
    position: { x:  1.3, y: 0.9,   z: -1.2 },
    size:     { w:  0.3,  h: 1.8,   d: 0.9  },
    color:    '#22c55e',
    visible:  true,
  },
];

/* ───────────────────────────────────────────────────────
   STEP 2 — CANVAS TEXTURE GENERATORS
   Procedurally create grid and wall textures so we have
   no external asset dependencies.
─────────────────────────────────────────────────────── */
function generateGridTexture() {
  const canvas = document.getElementById('grid-canvas');
  const ctx    = canvas.getContext('2d');
  const S      = canvas.width;

  ctx.fillStyle = 'rgba(5,5,16,0)';
  ctx.fillRect(0, 0, S, S);

  // Major grid lines
  ctx.strokeStyle = 'rgba(126,255,245,0.25)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i <= S; i += S / 8) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(S, i); ctx.stroke();
  }
  // Minor grid lines
  ctx.strokeStyle = 'rgba(126,255,245,0.08)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= S; i += S / 32) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(S, i); ctx.stroke();
  }
  // Centre cross
  ctx.strokeStyle = 'rgba(126,255,245,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(S/2,0); ctx.lineTo(S/2,S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,S/2); ctx.lineTo(S,S/2); ctx.stroke();

  document.getElementById('grid-tex').src = canvas.toDataURL();
}

function generateWallTexture() {
  const canvas = document.getElementById('wall-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Vertical scan lines — gives the Guardian "cage" feeling
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   'rgba(0,229,255,0.0)');
  grad.addColorStop(0.3, 'rgba(0,229,255,0.9)');
  grad.addColorStop(0.7, 'rgba(0,229,255,0.9)');
  grad.addColorStop(1,   'rgba(0,229,255,0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,229,255,0.8)';
  ctx.lineWidth = 1.5;
  for (let x = 0; x < W; x += 20) {
    const alpha = 0.3 + 0.5 * Math.abs(Math.sin(x * 0.05));
    ctx.strokeStyle = `rgba(0,229,255,${alpha.toFixed(2)})`;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  // Horizontal bands
  ctx.strokeStyle = 'rgba(0,229,255,0.25)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  document.getElementById('wall-tex').src = canvas.toDataURL();
}


/* ───────────────────────────────────────────────────────
   STEP 3 — BOUNDARY WALL BUILDER
   Generates four flat planes around the play area perimeter.
   Each plane is oriented to face inward so the texture
   is visible to the player.
─────────────────────────────────────────────────────── */
function buildBoundaryWalls() {
  const container = document.getElementById('boundary-container');
  const W = ROOM_CONFIG.width;
  const D = ROOM_CONFIG.depth;
  const H = ROOM_CONFIG.height;
  const T = ROOM_CONFIG.wallThickness;
  const vis = ROOM_CONFIG.boundaryVisible;
  const col = ROOM_CONFIG.boundaryColor;
  const op  = ROOM_CONFIG.boundaryOpacity;

  /*
    Wall definitions: [label, position, rotation, width, height]
    The four walls are placed half a room-width from centre
    and rotated to face inward.
  */
  const walls = [
    { id:'wall-north', pos: `0 ${H/2} ${-D/2}`, rot: '0 0 0',    w: W, h: H },
    { id:'wall-south', pos: `0 ${H/2} ${ D/2}`, rot: '0 180 0',  w: W, h: H },
    { id:'wall-east',  pos: `${ W/2} ${H/2} 0`, rot: '0 -90 0',  w: D, h: H },
    { id:'wall-west',  pos: `${-W/2} ${H/2} 0`, rot: '0 90 0',   w: D, h: H },
  ];

  walls.forEach(wall => {
    const plane = document.createElement('a-plane');
    plane.setAttribute('id',       wall.id);
    plane.setAttribute('position', wall.pos);
    plane.setAttribute('rotation', wall.rot);
    plane.setAttribute('width',    wall.w);
    plane.setAttribute('height',   wall.h);
    plane.setAttribute('material', `
      src: #wall-tex;
      color: ${col};
      transparent: true;
      opacity: ${vis ? op : 0};
      side: double;
      depthWrite: false;
      repeat: ${Math.round(wall.w * 1.5)} ${Math.round(wall.h * 1.5)}
    `);
    plane.setAttribute('class', 'boundary-wall');

    /*
      COLLISION NOTE:
      True physics collision in A-Frame requires a physics engine
      (e.g. aframe-physics-system). Here we add a data attribute
      so that the JS collision checker can find boundary planes.
      Swap in a real physics body if you add the physics component.
    */
    plane.setAttribute('data-collider', 'boundary');
    container.appendChild(plane);
  });

  document.getElementById('dbg-walls').textContent = walls.length;
}


/* ───────────────────────────────────────────────────────
   STEP 4 — OBSTACLE BUILDER
   Converts each entry in OBSTACLES into a visible box with
   a matching invisible (or visible) collider representation.
─────────────────────────────────────────────────────── */
function buildObstacles() {
  const container = document.getElementById('obstacle-container');

  OBSTACLES.forEach(obs => {
    const group = document.createElement('a-entity');
    group.setAttribute('id',       obs.id);
    group.setAttribute('position', `${obs.position.x} ${obs.position.y} ${obs.position.z}`);
    group.setAttribute('data-collider', 'obstacle');
    group.setAttribute('data-label', obs.label);

    // Visual box — semi-transparent so the player sees it
    if (obs.visible) {
      const box = document.createElement('a-box');
      box.setAttribute('width',  obs.size.w);
      box.setAttribute('height', obs.size.h);
      box.setAttribute('depth',  obs.size.d);
      box.setAttribute('material', `
        color: ${obs.color};
        transparent: true;
        opacity: 0.28;
        wireframe: false;
        side: double
      `);
      group.appendChild(box);

      // Wireframe outline on top for cleaner look
      const wire = document.createElement('a-box');
      wire.setAttribute('width',  obs.size.w + 0.005);
      wire.setAttribute('height', obs.size.h + 0.005);
      wire.setAttribute('depth',  obs.size.d + 0.005);
      wire.setAttribute('material', `
        color: ${obs.color};
        wireframe: true;
        transparent: true;
        opacity: 0.7
      `);
      group.appendChild(wire);

      // Floating label (visible in 3D space)
      const label = document.createElement('a-text');
      label.setAttribute('value',  obs.label);
      label.setAttribute('position', `0 ${obs.size.h / 2 + 0.15} 0`);
      label.setAttribute('align', 'center');
      label.setAttribute('color', obs.color);
      label.setAttribute('width', '1.5');
      label.setAttribute('side',  'double');
      group.appendChild(label);
    }

    container.appendChild(group);
  });

  document.getElementById('dbg-obs').textContent = OBSTACLES.length;
}


/* ───────────────────────────────────────────────────────
   STEP 5 — SOFT COLLISION DETECTION (no physics engine)
   On every animation frame we:
     1. Read the camera's world position (headset position).
     2. Check proximity against each obstacle AABB.
     3. If penetrating, compute the minimum translation
        vector and push the camera rig outward.

   For production: replace this with aframe-physics-system
   + static/dynamic body components for GPU-accelerated
   physics collision.
─────────────────────────────────────────────────────── */
AFRAME.registerComponent('room-scale-collision', {
  schema: {
    pushStrength:  { type: 'number', default: 1.0 },
    playerRadius:  { type: 'number', default: 0.2 },  // approx shoulder width / 2
  },

  init() {
    this.camRig    = document.getElementById('camera-rig');
    this.camera    = document.getElementById('player-camera');
    this.tmpPos    = new THREE.Vector3();
    this.tmpMin    = new THREE.Vector3();
    this.tmpMax    = new THREE.Vector3();
    this.pushVec   = new THREE.Vector3();
    this.lastPos   = new THREE.Vector3();
    this.colLabel  = document.getElementById('dbg-col');
    this.dbgPos    = document.getElementById('dbg-pos');
    this.lastCollision = '';
  },

  tick() {
    // --- Get headset world position ---
    const camObj = this.camera.object3D;
    camObj.getWorldPosition(this.tmpPos);

    const px = this.tmpPos.x;
    const pz = this.tmpPos.z;
    const r  = this.data.playerRadius;

    // Update 2D debug display
    this.dbgPos.textContent =
      `${px.toFixed(2)}, ${this.tmpPos.y.toFixed(2)}, ${pz.toFixed(2)}`;

    let activeCollision = 'none';

    // ── 5a. Obstacle AABB collision ──────────────────
    OBSTACLES.forEach(obs => {
      const hW = obs.size.w / 2 + r;
      const hD = obs.size.d / 2 + r;

      const minX = obs.position.x - hW;
      const maxX = obs.position.x + hW;
      const minZ = obs.position.z - hD;
      const maxZ = obs.position.z + hD;

      // Only XZ plane check (ignore Y — player can look over objects)
      if (px > minX && px < maxX && pz > minZ && pz < maxZ) {
        activeCollision = obs.label;

        /*
          Minimum Separation Push:
          Find which face is closest and push the rig to just
          outside that face. This prevents tunnelling.
        */
        const dLeft  =  px - minX;
        const dRight =  maxX - px;
        const dFront =  pz - minZ;
        const dBack  =  maxZ - pz;
        const minD   = Math.min(dLeft, dRight, dFront, dBack);

        const rigPos = this.camRig.getAttribute('position');
        if (minD === dLeft)  this.camRig.setAttribute('position', { x: rigPos.x - dLeft  * this.data.pushStrength, y: rigPos.y, z: rigPos.z });
        if (minD === dRight) this.camRig.setAttribute('position', { x: rigPos.x + dRight * this.data.pushStrength, y: rigPos.y, z: rigPos.z });
        if (minD === dFront) this.camRig.setAttribute('position', { x: rigPos.x, y: rigPos.y, z: rigPos.z - dFront * this.data.pushStrength });
        if (minD === dBack)  this.camRig.setAttribute('position', { x: rigPos.x, y: rigPos.y, z: rigPos.z + dBack  * this.data.pushStrength });
      }
    });

    // ── 5b. Boundary wall collision ──────────────────
    const hw = ROOM_CONFIG.width  / 2 - r;
    const hd = ROOM_CONFIG.depth  / 2 - r;
    const rigPos = this.camRig.getAttribute('position');
    let bx = rigPos.x;
    let bz = rigPos.z;

    if (px >  hw) { bx -= (px - hw);  activeCollision = 'Boundary'; }
    if (px < -hw) { bx += (-hw - px); activeCollision = 'Boundary'; }
    if (pz >  hd) { bz -= (pz - hd);  activeCollision = 'Boundary'; }
    if (pz < -hd) { bz += (-hd - pz); activeCollision = 'Boundary'; }

    if (bx !== rigPos.x || bz !== rigPos.z) {
      this.camRig.setAttribute('position', { x: bx, y: rigPos.y, z: bz });
    }

    // Update debug label only on change (avoid spam)
    if (activeCollision !== this.lastCollision) {
      this.lastCollision = activeCollision;
      this.colLabel.textContent = activeCollision;
      this.colLabel.style.color = activeCollision === 'none' ? '#7efff5' : '#ff6b35';
    }
  },
});


/* ───────────────────────────────────────────────────────
   STEP 6 — CARDINAL DIRECTION MARKERS
   Small glowing pillars at N / S / E / W edges of the
   play area so the player can orient themselves.
─────────────────────────────────────────────────────── */
function buildCardinalMarkers() {
  const container = document.getElementById('cardinal-markers');
  const W = ROOM_CONFIG.width  / 2 - 0.1;
  const D = ROOM_CONFIG.depth  / 2 - 0.1;

  const markers = [
    { label: 'N', pos: `0 0.6 ${-D}`, color: '#ff4444' },
    { label: 'S', pos: `0 0.6 ${ D}`, color: '#44ff88' },
    { label: 'E', pos: `${ W} 0.6 0`, color: '#4488ff' },
    { label: 'W', pos: `${-W} 0.6 0`, color: '#ffcc00' }
