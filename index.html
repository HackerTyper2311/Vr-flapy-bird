<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebXR Movement Detection VR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:'Courier New',monospace}

    /* \u2500\u2500 2D Dashboard (non-VR view) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    #dashboard{
      position:fixed;top:0;left:0;width:100%;height:100%;
      display:flex;flex-direction:column;
      pointer-events:none;z-index:100;
    }

    /* Top status bar */
    #status-bar{
      display:flex;gap:12px;padding:14px 18px;
      background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);
      pointer-events:auto;
    }
    .stat-chip{
      display:flex;align-items:center;gap:8px;
      background:rgba(10,12,30,0.85);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;padding:6px 14px;
      font-size:11px;color:#aaa;
      transition:border-color .3s,color .3s;
    }
    .stat-chip.active{border-color:rgba(0,255,180,0.6);color:#00ffb4}
    .stat-chip.warn  {border-color:rgba(255,180,0,0.6);color:#ffb400}
    .stat-chip.danger{border-color:rgba(255,60,60,0.6);color:#ff3c3c}
    .stat-dot{
      width:7px;height:7px;border-radius:50%;background:currentColor;
      animation:pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

    /* Movement state badge */
    #state-badge{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      text-align:center;pointer-events:none;
      transition:opacity .4s;
    }
    #state-icon{font-size:72px;line-height:1;filter:drop-shadow(0 0 20px currentColor)}
    #state-name{
      font-size:13px;letter-spacing:.3em;text-transform:uppercase;
      color:#fff;opacity:.7;margin-top:6px;
    }
    #state-speed{font-size:22px;color:#00ffb4;font-weight:700;margin-top:4px}

    /* Steps counter */
    #steps-display{
      position:fixed;bottom:80px;right:20px;text-align:right;
    }
    #steps-num{font-size:48px;font-weight:900;color:#fff;line-height:1}
    #steps-label{font-size:10px;letter-spacing:.2em;color:#666;text-transform:uppercase}

    /* Camera feed (hidden, used for motion detection) */
    #cam-feed{
      position:fixed;bottom:20px;right:20px;
      width:120px;height:90px;border-radius:8px;
      border:1px solid rgba(255,255,255,0.1);
      overflow:hidden;opacity:.6;
      pointer-events:auto;
    }
    #cam-video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
    #cam-motion-bar{
      position:absolute;bottom:0;left:0;height:3px;
      background:#00ffb4;width:0%;transition:width .1s;
    }
    #cam-label{
      position:absolute;top:4px;left:6px;font-size:9px;
      color:rgba(255,255,255,0.5);letter-spacing:.1em;text-transform:uppercase;
    }

    /* VR enter button */
    #vr-btn{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:transparent;border:1px solid rgba(0,255,180,0.5);
      color:#00ffb4;font-family:'Courier New',monospace;
      font-size:12px;letter-spacing:.2em;text-transform:uppercase;
      padding:10px 28px;border-radius:40px;cursor:pointer;
      pointer-events:auto;
      transition:background .2s,box-shadow .2s;
    }
    #vr-btn:hover{
      background:rgba(0,255,180,0.1);
      box-shadow:0 0 30px rgba(0,255,180,0.3);
    }

    /* Permission prompt */
    #perm-overlay{
      position:fixed;inset:0;background:rgba(0,0,10,0.95);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:200;
    }
    #perm-overlay h1{color:#fff;font-size:18px;letter-spacing:.1em}
    #perm-overlay p{color:#666;font-size:12px;text-align:center;max-width:300px;line-height:1.7}
    .perm-btn{
      background:rgba(0,255,180,0.15);border:1px solid rgba(0,255,180,0.4);
      color:#00ffb4;font-family:'Courier New',monospace;font-size:12px;
      letter-spacing:.15em;padding:10px 24px;border-radius:30px;cursor:pointer;
    }
  </style>
</head>
<body>

<!-- Permission overlay (shown on first load) -->
<div id="perm-overlay">
  <h1>\u2b21 MOVEMENT DETECTION VR</h1>
  <p>This experience uses your <strong style="color:#fff">GPS</strong>, <strong style="color:#fff">accelerometer</strong>, and <strong style="color:#fff">camera</strong> to detect walking and running in real-time and reflect it inside VR.</p>
  <button class="perm-btn" onclick="requestPermissions()">GRANT ACCESS &amp; START</button>
</div>

<!-- 2D Dashboard -->
<div id="dashboard">
  <div id="status-bar">
    <div class="stat-chip" id="chip-gps">
      <div class="stat-dot"></div>GPS
    </div>
    <div class="stat-chip" id="chip-accel">
      <div class="stat-dot"></div>ACCEL
    </div>
    <div class="stat-chip" id="chip-cam">
      <div class="stat-dot"></div>CAM
    </div>
    <div class="stat-chip" id="chip-xr">
      <div class="stat-dot"></div>XR
    </div>
  </div>

  <div id="state-badge">
    <div id="state-icon">\ud83e\uddcd</div>
    <div id="state-name">IDLE</div>
    <div id="state-speed">0.0 km/h</div>
  </div>

  <div id="steps-display">
    <div id="steps-num">0</div>
    <div id="steps-label">steps</div>
  </div>
</div>

<!-- Camera feed (for optical motion detection) -->
<div id="cam-feed">
  <video id="cam-video" autoplay muted playsinline></video>
  <canvas id="cam-canvas" style="display:none" width="80" height="60"></canvas>
  <div id="cam-motion-bar"></div>
  <div id="cam-label">CAM MOTION</div>
</div>

<button id="vr-btn" onclick="document.querySelector('a-scene').enterVR()">\u25b6 ENTER VR</button>


<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
     A-FRAME SCENE
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->
<a-scene
  id="main-scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking"
  renderer="antialias:true;colorManagement:true"
  background="color:#020208"
  vr-mode-ui="enabled:false"
>

  <!-- ASSETS -->
  <a-assets>
    <canvas id="floor-canvas" width="512" height="512"></canvas>
    <img id="floor-tex" src="">
  </a-assets>

  <!-- \u2500\u2500 CAMERA RIG \u2500\u2500
       WebXR drives this 1:1 with headset position.
       The movement-detection component translates GPS/accel
       data into a forward push on this rig when in flat mode.
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
  <a-entity id="camera-rig" position="0 0 0" movement-driver>
    <a-camera
      id="player-cam"
      look-controls="enabled:false"
      wasd-controls="enabled:false"
      user-height="0"
      near="0.05" far="200"
    >
      <!-- VR HUD \u2014 attached to camera, always visible in headset -->
      <a-entity id="vr-hud" position="0 0 -1.4" visible="false">

        <!-- State panel background -->
        <a-rounded
          width="0.55" height="0.22" radius="0.03"
          color="#050510" opacity="0.85"
          position="0 0.05 0"
        ></a-rounded>

        <!-- Movement state text (e.g. WALKING) -->
        <a-text
          id="hud-state"
          value="IDLE"
          align="center"
          color="#00ffb4"
          width="1.1"
          position="0 0.1 0.001"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        ></a-text>

        <!-- Speed readout -->
        <a-text
          id="hud-speed"
          value="0.0 km/h"
          align="center"
          color="#ffffff"
          width="0.65"
          position="0 0.03 0.001"
        ></a-text>

        <!-- Steps readout -->
        <a-text
          id="hud-steps"
          value="0 steps"
          align="center"
          color="#888"
          width="0.55"
          position="0 -0.04 0.001"
        ></a-text>

        <!-- Sensor source indicators -->
        <a-text
          id="hud-sensors"
          value="GPS \u25cf ACCEL \u25cf CAM"
          align="center"
          color="#334"
          width="0.5"
          position="0 -0.09 0.001"
        ></a-text>

      </a-entity>

      <!-- Crosshair -->
      <a-cursor color="#00ffb4" opacity="0.4"
                raycaster="objects:.interactive" fuse="false">
      </a-cursor>
    </a-camera>
  </a-entity>


  <!-- \u2500\u2500 ENVIRONMENT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
  <a-sky color="#020208"></a-sky>
  <a-entity id="stars-container"></a-entity>

  <!-- Floor -->
  <a-plane
    id="floor-plane"
    rotation="-90 0 0"
    width="40" height="40"
    material="src:#floor-tex;repeat:20 20;transparent:true;opacity:0.9"
  ></a-plane>

  <!-- Ambient glow under player -->
  <a-circle
    id="player-glow"
    radius="0.35"
    rotation="-90 0 0"
    position="0 0.005 0"
    material="color:#00ffb4;transparent:true;opacity:0.12;shader:flat"
    glow-follow
  ></a-circle>

  <!-- \u2500\u2500 FOOTSTEP RIPPLES (spawned by JS) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
  <a-entity id="ripple-pool"></a-entity>

  <!-- \u2500\u2500 MOVEMENT TRAIL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
  <a-entity id="trail-container"></a-entity>

  <!-- \u2500\u2500 BOUNDARY WALLS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
  <a-entity id="boundary-container"></a-entity>

  <!-- \u2500\u2500 OBSTACLES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
  <a-entity id="obstacle-container"></a-entity>

  <!-- Lighting -->
  <a-light type="ambient"     color="#0a0a20" intensity="2.0"></a-light>
  <a-light type="directional" color="#00ffb4" intensity="0.4"
           position="2 6 -2"></a-light>
  <a-light type="point" id="move-light"
           color="#00ffb4" intensity="0" distance="3"
           position="0 0.5 0"></a-light>

</a-scene>


<script>
'use strict';
/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   CONFIGURATION
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
const CONFIG = {
  room: { w: 4, d: 4, h: 2.4 },

  // Speed thresholds (m/s) for state classification
  speed: { walkMin: 0.4, runMin: 2.2 },

  // Accelerometer step detection \u2014 peak threshold for magnitude
  accel: { stepThreshold: 1.8, stepCooldownMs: 300 },

  // Camera optical flow: pixel diff threshold (0-255)
  camera: { motionThreshold: 18, sampleRate: 8 },   // check every N frames

  // How much the rig shifts per step (flat/desktop mode only, not XR)
  stepMove: 0.5,
};

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   GLOBAL STATE
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
const STATE = {
  mode: 'idle',       // 'idle' | 'walking' | 'running'
  speedKmh: 0,
  steps: 0,
  gpsActive: false,
  accelActive: false,
  camActive: false,

  // GPS
  lastGpsPos: null,
  lastGpsTime: 0,
  gpsSpeed: 0,         // m/s

  // Accelerometer
  lastStepTime: 0,
  accelMag: 0,
  stepCadence: 0,      // steps/min
  stepTimes: [],       // rolling buffer for cadence calc

  // Camera optical flow
  prevFrame: null,
  camMotion: 0,        // 0..1

  // For non-XR preview movement
  previewHeading: 0,
};

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   PERMISSIONS + SENSOR INIT
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
async function requestPermissions() {
  document.getElementById('perm-overlay').style.display = 'none';

  await startGPS();
  await startAccelerometer();
  await startCamera();
  startMovementEngine();
}

/* \u2500\u2500 GPS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
function startGPS() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { resolve(); return; }

    navigator.geolocation.watchPosition(onGpsUpdate, onGpsError, {
      enableHighAccuracy: true,
      maximumAge: 500,
      timeout: 8000,
    });
    resolve();
  });
}

function onGpsUpdate(pos) {
  setChipActive('chip-gps', true);
  STATE.gpsActive = true;

  const now = Date.now();
  const { latitude: lat, longitude: lng, speed } = pos.coords;

  // Use native speed if available (most mobile browsers provide it)
  if (speed !== null && speed >= 0) {
    STATE.gpsSpeed = speed;
  } else if (STATE.lastGpsPos) {
    // Fallback: calculate from position delta
    const dist = haversineMeters(STATE.lastGpsPos.lat, STATE.lastGpsPos.lng, lat, lng);
    const dt   = (now - STATE.lastGpsTime) / 1000;
    STATE.gpsSpeed = dt > 0 ? dist / dt : 0;
  }

  STATE.lastGpsPos  = { lat, lng };
  STATE.lastGpsTime = now;
}

function onGpsError(e) {
  console.warn('GPS error:', e.message);
  setChipActive('chip-gps', false, 'warn');
}

/* \u2500\u2500 ACCELEROMETER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
async function startAccelerometer() {
  /*
    iOS 13+ requires DeviceMotionEvent.requestPermission()
    Android grants automatically on HTTPS.
  */
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const res = await DeviceMotionEvent.requestPermission();
      if (res !== 'granted') return;
    } catch(e) { return; }
  }

  window.addEventListener('devicemotion', onDeviceMotion);
  setChipActive('chip-accel', true);
  STATE.accelActive = true;
}

function onDeviceMotion(e) {
  const a = e.accelerationIncludingGravity;
  if (!a) return;

  // Magnitude of the acceleration vector
  const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
  STATE.accelMag = mag;

  const now = Date.now();

  /*
    Step detection via peak detection:
    When magnitude exceeds threshold and enough time
    has passed since the last step, count a step.
  */
  if (mag > CONFIG.accel.stepThreshold &&
      (now - STATE.lastStepTime) > CONFIG.accel.stepCooldownMs) {
    STATE.steps++;
    STATE.lastStepTime = now;

    // Cadence: keep last 6 step timestamps
    STATE.stepTimes.push(now);
    if (STATE.stepTimes.length > 6) STATE.stepTimes.shift();
    if (STATE.stepTimes.length >= 2) {
      const span = (STATE.stepTimes.at(-1) - STATE.stepTimes[0]) / 1000;
      STATE.stepCadence = (STATE.stepTimes.length - 1) / span * 60;
    }

    onStepDetected();
  }
}

/* \u2500\u2500 CAMERA OPTICAL FLOW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: 160, height: 120 },
      audio: false,
    });
    const video  = document.getElementById('cam-video');
    video.srcObject = stream;
    setChipActive('chip-cam', true);
    STATE.camActive = true;

    let frameCount = 0;
    const canvas = document.getElementById('cam-canvas');
    const ctx    = canvas.getContext('2d', { willReadFrequently: true });

    function analyseFrame() {
      frameCount++;
      if (frameCount % CONFIG.camera.sampleRate === 0) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        if (STATE.prevFrame) {
          let diff = 0;
          // Sample every 4th pixel for performance
          for (let i = 0; i < data.length; i += 16) {
            diff += Math.abs(data[i]   - STATE.prevFrame[i])
                  + Math.abs(data[i+1] - STATE.prevFrame[i+1])
                  + Math.abs(data[i+2] - STATE.prevFrame[i+2]);
          }
          const avgDiff = diff / (data.length / 16);
          STATE.camMotion = Math.min(avgDiff / 80, 1); // normalise 0..1
          document.getElementById('cam-motion-bar').style.width =
            (STATE.camMotion * 100) + '%';
        }
        STATE.prevFrame = new Uint8ClampedArray(data);
      }
      requestAnimationFrame(analyseFrame);
    }
    video.onloadedmetadata = () => analyseFrame();
  } catch(e) {
    console.warn('Camera not available:', e.message);
    setChipActive('chip-cam', false, 'warn');
  }
}


/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   MOVEMENT ENGINE
   Fuses GPS speed + accelerometer cadence + camera motion
   into a single movement state every 500ms.
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function startMovementEngine() {
  setIn      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #7efff5;
      color: #050510;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 32px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 0 24px rgba(126,255,245,0.4);
      z-index: 9999;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #enter-vr-btn:hover {
      background: #fff;
      box-shadow: 0 0 40px rgba(126,255,245,0.8);
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     DEBUG PANEL  (visible in browser, hidden in VR)
═══════════════════════════════════════════════════ -->
<div id="debug-panel">
  <h2>⬡ Room-Scale VR Template</h2>
  <span class="dim">Headset position:</span> <span id="dbg-pos">–</span><br/>
  <span class="dim">Boundary walls:</span>   <span id="dbg-walls">0</span><br/>
  <span class="dim">Obstacles:</span>        <span id="dbg-obs">0</span><br/>
  <span class="dim">Collision:</span>        <span id="dbg-col">none</span><br/>
  <br/>
  <span class="dim">Edit ROOM_CONFIG + OBSTACLES</span><br/>
  <span class="dim">in the &lt;script&gt; block below.</span>
</div>

<button id="enter-vr-btn" onclick="document.querySelector('a-scene').enterVR()">
  ▶ ENTER VR
</button>


<!-- ═══════════════════════════════════════════════════
     A-FRAME SCENE
═══════════════════════════════════════════════════ -->
<a-scene
  id="main-scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  background="color: #050510"
  stats="false"
>

  <!-- ─── ASSETS ─────────────────────────────────── -->
  <a-assets>
    <!-- Grid texture for the floor (generated via canvas) -->
    <canvas id="grid-canvas" width="512" height="512"></canvas>
    <img id="grid-tex" src="">

    <!-- Boundary wall texture (generated via canvas) -->
    <canvas id="wall-canvas" width="256" height="256"></canvas>
    <img id="wall-tex" src="">
  </a-assets>


  <!-- ─── CAMERA RIG ──────────────────────────────
       The rig entity is the root that sits at floor level.
       WebXR automatically positions the <a-camera> inside it
       to match the headset's 6DoF pose — giving 1:1 room-scale
       movement with NO locomotion component needed.
  ──────────────────────────────────────────────── -->
  <a-entity
    id="camera-rig"
    position="0 0 0"
  >
    <!--
      wasd-controls and look-controls are DISABLED so that
      only physical headset movement drives the camera.
      The 'camera' component with userHeight=0 means the
      real-world floor == y=0 in VR space.
    -->
    <a-camera
      id="player-camera"
      look-controls="enabled: false"
      wasd-controls="enabled: false"
      user-height="0"
      near="0.05"
      far="100"
    >
      <!-- Tiny crosshair reticle (optional, hidden by default) -->
      <a-cursor
        color="#7efff5"
        opacity="0.5"
        raycaster="objects: .interactive"
        fuse="false"
      ></a-cursor>
    </a-camera>
  </a-entity>


  <!-- ─── ENVIRONMENT ────────────────────────────── -->

  <!-- Sky gradient sphere -->
  <a-sky color="#050510"></a-sky>

  <!-- Stars particle field -->
  <a-entity id="stars" position="0 0 0"></a-entity>

  <!-- Ground platform — grid texture applied by JS -->
  <a-plane
    id="floor"
    rotation="-90 0 0"
    width="20" height="20"
    material="src: #grid-tex; repeat: 10 10; transparent: true; opacity: 0.85"
    shadow="receive: true"
  ></a-plane>

  <!-- Ambient + directional lighting -->
  <a-light type="ambient"     color="#1a1a3e" intensity="1.2"></a-light>
  <a-light type="directional" color="#7efff5" intensity="0.6"
           position="3 8 -3" castShadow="true"></a-light>
  <a-light type="point"       color="#4488ff" intensity="0.4"
           position="0 2.5 0"></a-light>


  <!-- ─── BOUNDARY WALLS CONTAINER ───────────────
       JS will dynamically populate this with flat planes
       that represent the Guardian/Chaperone boundary.
  ──────────────────────────────────────────────── -->
  <a-entity id="boundary-container"></a-entity>


  <!-- ─── OBSTACLE CONTAINER ─────────────────────
       JS will dynamically populate this with box colliders
       that mirror real-world furniture / objects.
  ──────────────────────────────────────────────── -->
  <a-entity id="obstacle-container"></a-entity>


  <!-- ─── DECORATIVE REFERENCE OBJECTS ───────────
       Help the player orient themselves in the space.
  ──────────────────────────────────────────────── -->

  <!-- Cardinal direction markers -->
  <a-entity id="cardinal-markers"></a-entity>

  <!-- Center origin pillar -->
  <a-cylinder
    position="0 0.5 0"
    radius="0.02" height="1"
    color="#7efff5"
    material="emissive: #7efff5; emissiveIntensity: 0.6; transparent: true; opacity: 0.7"
  ></a-cylinder>
  <a-sphere
    position="0 1.05 0"
    radius="0.04"
    color="#7efff5"
    material="emissive: #7efff5; emissiveIntensity: 1"
  ></a-sphere>

</a-scene>


<!-- ═══════════════════════════════════════════════════
     MAIN CONFIGURATION + LOGIC
═══════════════════════════════════════════════════ -->
<script>
/* ───────────────────────────────────────────────────────
   STEP 1 — ROOM CONFIGURATION
   Edit these values to match your physical space.

   ROOM_CONFIG.width / depth : size of your play area in metres
   ROOM_CONFIG.origin        : where VR (0,0,0) sits relative
                               to the room's back-left corner
   OBSTACLES                 : real-world objects mapped to
                               axis-aligned bounding boxes.
                               Position = centre of object,
                               size = full extents.
─────────────────────────────────────────────────────── */
const ROOM_CONFIG = {
  width:  3.0,   // metres — X axis
  depth:  3.0,   // metres — Z axis
  height: 2.5,   // metres — ceiling reference (not enforced)
  wallThickness: 0.08,   // visual thickness of boundary planes
  boundaryColor:   '#00e5ff',
  boundaryOpacity: 0.18,   // 0 = invisible, 1 = fully solid
  boundaryVisible: true,   // toggle boundary planes on/off
};

/*
  Each obstacle entry:
  {
    id:       unique string id
    label:    human-readable name
    position: { x, y, z }   — centre of object, y=0 is floor
    size:     { w, h, d }   — full width / height / depth
    color:    CSS colour for the visual representation
    visible:  show a semi-transparent box (true) or invisible collider (false)
  }
*/
const OBSTACLES = [
  {
    id: 'table-1',
    label: 'Desk',
    position: { x:  1.0, y: 0.375, z:  0.5 },
    size:     { w:  1.2,  h: 0.75,  d: 0.6  },
    color:    '#ff6b35',
    visible:  true,
  },
  {
    id: 'chair-1',
    label: 'Chair',
    position: { x: -0.8, y: 0.45,  z: -0.5 },
    size:     { w:  0.5,  h: 0.9,   d: 0.5  },
    color:    '#a855f7',
    visible:  true,
  },
  {
    id: 'shelf-1',
    label: 'Bookshelf',
    position: { x:  1.3, y: 0.9,   z: -1.2 },
    size:     { w:  0.3,  h: 1.8,   d: 0.9  },
    color:    '#22c55e',
    visible:  true,
  },
];

/* ───────────────────────────────────────────────────────
   STEP 2 — CANVAS TEXTURE GENERATORS
   Procedurally create grid and wall textures so we have
   no external asset dependencies.
─────────────────────────────────────────────────────── */
function generateGridTexture() {
  const canvas = document.getElementById('grid-canvas');
  const ctx    = canvas.getContext('2d');
  const S      = canvas.width;

  ctx.fillStyle = 'rgba(5,5,16,0)';
  ctx.fillRect(0, 0, S, S);

  // Major grid lines
  ctx.strokeStyle = 'rgba(126,255,245,0.25)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i <= S; i += S / 8) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(S, i); ctx.stroke();
  }
  // Minor grid lines
  ctx.strokeStyle = 'rgba(126,255,245,0.08)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= S; i += S / 32) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(S, i); ctx.stroke();
  }
  // Centre cross
  ctx.strokeStyle = 'rgba(126,255,245,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(S/2,0); ctx.lineTo(S/2,S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,S/2); ctx.lineTo(S,S/2); ctx.stroke();

  document.getElementById('grid-tex').src = canvas.toDataURL();
}

function generateWallTexture() {
  const canvas = document.getElementById('wall-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Vertical scan lines — gives the Guardian "cage" feeling
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   'rgba(0,229,255,0.0)');
  grad.addColorStop(0.3, 'rgba(0,229,255,0.9)');
  grad.addColorStop(0.7, 'rgba(0,229,255,0.9)');
  grad.addColorStop(1,   'rgba(0,229,255,0.0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,229,255,0.8)';
  ctx.lineWidth = 1.5;
  for (let x = 0; x < W; x += 20) {
    const alpha = 0.3 + 0.5 * Math.abs(Math.sin(x * 0.05));
    ctx.strokeStyle = `rgba(0,229,255,${alpha.toFixed(2)})`;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  // Horizontal bands
  ctx.strokeStyle = 'rgba(0,229,255,0.25)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  document.getElementById('wall-tex').src = canvas.toDataURL();
}


/* ───────────────────────────────────────────────────────
   STEP 3 — BOUNDARY WALL BUILDER
   Generates four flat planes around the play area perimeter.
   Each plane is oriented to face inward so the texture
   is visible to the player.
─────────────────────────────────────────────────────── */
function buildBoundaryWalls() {
  const container = document.getElementById('boundary-container');
  const W = ROOM_CONFIG.width;
  const D = ROOM_CONFIG.depth;
  const H = ROOM_CONFIG.height;
  const T = ROOM_CONFIG.wallThickness;
  const vis = ROOM_CONFIG.boundaryVisible;
  const col = ROOM_CONFIG.boundaryColor;
  const op  = ROOM_CONFIG.boundaryOpacity;

  /*
    Wall definitions: [label, position, rotation, width, height]
    The four walls are placed half a room-width from centre
    and rotated to face inward.
  */
  const walls = [
    { id:'wall-north', pos: `0 ${H/2} ${-D/2}`, rot: '0 0 0',    w: W, h: H },
    { id:'wall-south', pos: `0 ${H/2} ${ D/2}`, rot: '0 180 0',  w: W, h: H },
    { id:'wall-east',  pos: `${ W/2} ${H/2} 0`, rot: '0 -90 0',  w: D, h: H },
    { id:'wall-west',  pos: `${-W/2} ${H/2} 0`, rot: '0 90 0',   w: D, h: H },
  ];

  walls.forEach(wall => {
    const plane = document.createElement('a-plane');
    plane.setAttribute('id',       wall.id);
    plane.setAttribute('position', wall.pos);
    plane.setAttribute('rotation', wall.rot);
    plane.setAttribute('width',    wall.w);
    plane.setAttribute('height',   wall.h);
    plane.setAttribute('material', `
      src: #wall-tex;
      color: ${col};
      transparent: true;
      opacity: ${vis ? op : 0};
      side: double;
      depthWrite: false;
      repeat: ${Math.round(wall.w * 1.5)} ${Math.round(wall.h * 1.5)}
    `);
    plane.setAttribute('class', 'boundary-wall');

    /*
      COLLISION NOTE:
      True physics collision in A-Frame requires a physics engine
      (e.g. aframe-physics-system). Here we add a data attribute
      so that the JS collision checker can find boundary planes.
      Swap in a real physics body if you add the physics component.
    */
    plane.setAttribute('data-collider', 'boundary');
    container.appendChild(plane);
  });

  document.getElementById('dbg-walls').textContent = walls.length;
}


/* ───────────────────────────────────────────────────────
   STEP 4 — OBSTACLE BUILDER
   Converts each entry in OBSTACLES into a visible box with
   a matching invisible (or visible) collider representation.
─────────────────────────────────────────────────────── */
function buildObstacles() {
  const container = document.getElementById('obstacle-container');

  OBSTACLES.forEach(obs => {
    const group = document.createElement('a-entity');
    group.setAttribute('id',       obs.id);
    group.setAttribute('position', `${obs.position.x} ${obs.position.y} ${obs.position.z}`);
    group.setAttribute('data-collider', 'obstacle');
    group.setAttribute('data-label', obs.label);

    // Visual box — semi-transparent so the player sees it
    if (obs.visible) {
      const box = document.createElement('a-box');
      box.setAttribute('width',  obs.size.w);
      box.setAttribute('height', obs.size.h);
      box.setAttribute('depth',  obs.size.d);
      box.setAttribute('material', `
        color: ${obs.color};
        transparent: true;
        opacity: 0.28;
        wireframe: false;
        side: double
      `);
      group.appendChild(box);

      // Wireframe outline on top for cleaner look
      const wire = document.createElement('a-box');
      wire.setAttribute('width',  obs.size.w + 0.005);
      wire.setAttribute('height', obs.size.h + 0.005);
      wire.setAttribute('depth',  obs.size.d + 0.005);
      wire.setAttribute('material', `
        color: ${obs.color};
        wireframe: true;
        transparent: true;
        opacity: 0.7
      `);
      group.appendChild(wire);

      // Floating label (visible in 3D space)
      const label = document.createElement('a-text');
      label.setAttribute('value',  obs.label);
      label.setAttribute('position', `0 ${obs.size.h / 2 + 0.15} 0`);
      label.setAttribute('align', 'center');
      label.setAttribute('color', obs.color);
      label.setAttribute('width', '1.5');
      label.setAttribute('side',  'double');
      group.appendChild(label);
    }

    container.appendChild(group);
  });

  document.getElementById('dbg-obs').textContent = OBSTACLES.length;
}


/* ───────────────────────────────────────────────────────
   STEP 5 — SOFT COLLISION DETECTION (no physics engine)
   On every animation frame we:
     1. Read the camera's world position (headset position).
     2. Check proximity against each obstacle AABB.
     3. If penetrating, compute the minimum translation
        vector and push the camera rig outward.

   For production: replace this with aframe-physics-system
   + static/dynamic body components for GPU-accelerated
   physics collision.
─────────────────────────────────────────────────────── */
AFRAME.registerComponent('room-scale-collision', {
  schema: {
    pushStrength:  { type: 'number', default: 1.0 },
    playerRadius:  { type: 'number', default: 0.2 },  // approx shoulder width / 2
  },

  init() {
    this.camRig    = document.getElementById('camera-rig');
    this.camera    = document.getElementById('player-camera');
    this.tmpPos    = new THREE.Vector3();
    this.tmpMin    = new THREE.Vector3();
    this.tmpMax    = new THREE.Vector3();
    this.pushVec   = new THREE.Vector3();
    this.lastPos   = new THREE.Vector3();
    this.colLabel  = document.getElementById('dbg-col');
    this.dbgPos    = document.getElementById('dbg-pos');
    this.lastCollision = '';
  },

  tick() {
    // --- Get headset world position ---
    const camObj = this.camera.object3D;
    camObj.getWorldPosition(this.tmpPos);

    const px = this.tmpPos.x;
    const pz = this.tmpPos.z;
    const r  = this.data.playerRadius;

    // Update 2D debug display
    this.dbgPos.textContent =
      `${px.toFixed(2)}, ${this.tmpPos.y.toFixed(2)}, ${pz.toFixed(2)}`;

    let activeCollision = 'none';

    // ── 5a. Obstacle AABB collision ──────────────────
    OBSTACLES.forEach(obs => {
      const hW = obs.size.w / 2 + r;
      const hD = obs.size.d / 2 + r;

      const minX = obs.position.x - hW;
      const maxX = obs.position.x + hW;
      const minZ = obs.position.z - hD;
      const maxZ = obs.position.z + hD;

      // Only XZ plane check (ignore Y — player can look over objects)
      if (px > minX && px < maxX && pz > minZ && pz < maxZ) {
        activeCollision = obs.label;

        /*
          Minimum Separation Push:
          Find which face is closest and push the rig to just
          outside that face. This prevents tunnelling.
        */
        const dLeft  =  px - minX;
        const dRight =  maxX - px;
        const dFront =  pz - minZ;
        const dBack  =  maxZ - pz;
        const minD   = Math.min(dLeft, dRight, dFront, dBack);

        const rigPos = this.camRig.getAttribute('position');
        if (minD === dLeft)  this.camRig.setAttribute('position', { x: rigPos.x - dLeft  * this.data.pushStrength, y: rigPos.y, z: rigPos.z });
        if (minD === dRight) this.camRig.setAttribute('position', { x: rigPos.x + dRight * this.data.pushStrength, y: rigPos.y, z: rigPos.z });
        if (minD === dFront) this.camRig.setAttribute('position', { x: rigPos.x, y: rigPos.y, z: rigPos.z - dFront * this.data.pushStrength });
        if (minD === dBack)  this.camRig.setAttribute('position', { x: rigPos.x, y: rigPos.y, z: rigPos.z + dBack  * this.data.pushStrength });
      }
    });

    // ── 5b. Boundary wall collision ──────────────────
    const hw = ROOM_CONFIG.width  / 2 - r;
    const hd = ROOM_CONFIG.depth  / 2 - r;
    const rigPos = this.camRig.getAttribute('position');
    let bx = rigPos.x;
    let bz = rigPos.z;

    if (px >  hw) { bx -= (px - hw);  activeCollision = 'Boundary'; }
    if (px < -hw) { bx += (-hw - px); activeCollision = 'Boundary'; }
    if (pz >  hd) { bz -= (pz - hd);  activeCollision = 'Boundary'; }
    if (pz < -hd) { bz += (-hd - pz); activeCollision = 'Boundary'; }

    if (bx !== rigPos.x || bz !== rigPos.z) {
      this.camRig.setAttribute('position', { x: bx, y: rigPos.y, z: bz });
    }

    // Update debug label only on change (avoid spam)
    if (activeCollision !== this.lastCollision) {
      this.lastCollision = activeCollision;
      this.colLabel.textContent = activeCollision;
      this.colLabel.style.color = activeCollision === 'none' ? '#7efff5' : '#ff6b35';
    }
  },
});


/* ───────────────────────────────────────────────────────
   STEP 6 — CARDINAL DIRECTION MARKERS
   Small glowing pillars at N / S / E / W edges of the
   play area so the player can orient themselves.
─────────────────────────────────────────────────────── */
function buildCardinalMarkers() {
  const container = document.getElementById('cardinal-markers');
  const W = ROOM_CONFIG.width  / 2 - 0.1;
  const D = ROOM_CONFIG.depth  / 2 - 0.1;

  const markers = [
    { label: 'N', pos: `0 0.6 ${-D}`, color: '#ff4444' },
    { label: 'S', pos: `0 0.6 ${ D}`, color: '#44ff88' },
    { label: 'E', pos: `${ W} 0.6 0`, color: '#4488ff' },
    { label: 'W', pos: `${-W} 0.6 0`, color: '#ffcc00' }
