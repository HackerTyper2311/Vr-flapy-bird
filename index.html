<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Room-Scale Movement</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
<a-scene vr-mode-ui="enabled: true" xrweb>

  <!-- Sky -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- Platform / Ground -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#7CFC00"></a-plane>

  <!-- Obstakel ter referentie -->
  <a-box position="0 0.5 -5" depth="1" height="1" width="3" color="red"></a-box>

  <!-- Player / Camera Rig voor echte beweging -->
  <a-entity id="playerRig" position="0 0 0">
    <a-camera wasd-controls-enabled="false"></a-camera>
  </a-entity>

</a-scene>
</body>
</html>
